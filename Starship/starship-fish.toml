add_newline = true

format = """
[оӮ¶](fg:#4480b5)\
$os\
$username\
[оӮ°](bg:#8ebad9 fg:#4480b5)\
$directory\
[оӮ°](bg:#6fa4cc fg:#8ebad9)\
$git_branch\
$git_status\
[оӮ°](bg:#5c90b8 fg:#6fa4cc)\
$c\
$rust\
$golang\
$nodejs\
$python\
$java\
[оӮ°](fg:#5c90b8)
$character
"""

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ OS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
style = "bg:#4480b5 fg:#fdf5e6"
symbols.Fedora = "пҢҠ "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ USER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always = true
style_user = "bg:#4480b5 fg:#fdf5e6"
format = "[$user]($style)"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ DIRECTORY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style = "bg:#8ebad9 fg:#0a2540"
format = "[ $path ]($style)"
truncation_length = 3
fish_style_pwd_dir_length = 1

[directory.substitutions]
Documents = "у°Ҳҷ "
Downloads = "пҖҷ "
Music = "у°қҡ "
Pictures = "пҖҫ "
Developer = "у°ІӢ "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ GIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "пҗҳ "
style = "bg:#6fa4cc fg:#0a2540"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#6fa4cc fg:#0a2540"
format = "[($all_status$ahead_behind )]($style)"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ LANGUAGES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
symbol = "оңҳ "
style = "bg:#5c90b8 fg:#0a2540"
format = "[ $symbol($version) ]($style)"

[python]
symbol = "оҳҶ "
style = "bg:#5c90b8 fg:#0a2540"
format = "[ $symbol($version) ]($style)"

[golang]
symbol = "оҳ§ "
style = "bg:#5c90b8 fg:#0a2540"
format = "[ $symbol($version) ]($style)"

[rust]
symbol = "оһЁ "
style = "bg:#5c90b8 fg:#0a2540"
format = "[ $symbol($version) ]($style)"

[c]
symbol = "оҳһ "
style = "bg:#5c90b8 fg:#0a2540"
format = "[ $symbol($version) ]($style)"

[java]
symbol = "оү– "
style = "bg:#5c90b8 fg:#0a2540"
format = "[ $symbol($version) ]($style)"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CHARACTER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[ вқҜ](bold #8ebad9)"
error_symbol = "[ вқҜ](bold #d97d75)"вҸҺ  